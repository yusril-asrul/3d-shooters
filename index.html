<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: monospace; }
    canvas { display: block; }

    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
      color: rgba(255, 255, 255, 0.8);
      font-size: 28px;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
      line-height: 1;
      user-select: none;
      transition: color 0.05s;
    }
    #crosshair.hit { color: #ff4444; font-size: 34px; }

    #hitmarker {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 11;
      color: #fff;
      font-size: 20px;
      text-shadow: 0 0 6px rgba(0,0,0,0.9);
      user-select: none;
      opacity: 0;
      transition: opacity 0.05s;
      line-height: 1;
    }
    #hitmarker.show { opacity: 1; }

    #damage-overlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.5));
      opacity: 0;
      transition: opacity 0.1s;
    }
    #damage-overlay.show { opacity: 1; }

    #minimap {
      position: fixed;
      bottom: 20px; left: 20px;
      z-index: 10;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      pointer-events: none;
      user-select: none;
      overflow: hidden;
      background: rgba(0,0,0,0.5);
    }
    #minimap canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #hud {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 10;
      color: #fff;
      font-size: 18px;
      text-shadow: 0 0 6px rgba(0,0,0,0.9);
      user-select: none;
      line-height: 1.6;
    }

    #message {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      color: #fff;
      font-size: 28px;
      text-align: center;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
      user-select: none;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #message.show { opacity: 1; }

    #ammo-display {
      position: fixed;
      bottom: 40px; right: 40px;
      z-index: 10;
      color: #fff;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 0 0 6px rgba(0,0,0,0.9);
      user-select: none;
      font-family: monospace;
    }

    #instructions {
      position: fixed;
      bottom: 40px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      text-shadow: 0 0 6px rgba(0,0,0,0.9);
      user-select: none;
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="damage-overlay"></div>
  <div id="crosshair">+</div>
  <div id="hitmarker">✕</div>
  <div id="minimap"><canvas id="minimap-canvas" width="140" height="140"></canvas></div>
  <div id="hud">
    <div>🎯 Score: <span id="score">0</span></div>
    <div>💀 Kills: <span id="kills">0</span></div>
    <div>❤️ Health: <span id="health">100</span></div>
  </div>
  <div id="ammo-display"><span id="ammo">30</span> / <span id="reserve">90</span></div>
  <div id="message">Klik untuk mulai</div>
  <div id="instructions">WASD Gerak  |  Mouse Lihat  |  Klik Tembak  |  Kanan Aim  |  R Reload  |  Spasi Lompat</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
